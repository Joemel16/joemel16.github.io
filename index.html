<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>joemeljhoy.ph</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="color-1.css">

  <!-- ✅ Font Awesome (WORKING + supports fa fa-home) -->

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/v4-shims.min.css">

<body>

<div class="main-container">

  <div class="aside">
    <div class="logo">

    </div>

    <ul class="nav">
      <li><a href="#home"><i class="fa fa-home"></i> Home</a></li>
      <li><a href="#about"><i class="fa fa-user"></i> About</a></li>
      <li><a href="#services"><i class="fa fa-list"></i> Service</a></li>
      <li><a href="#contact"><i class="fa fa-comments"></i> Contact</a></li>
    </ul>
  </div>

  <div class="main-content">

    <!-- HOME -->
    <section class="home section" id="home">
      <div class="container">
        <div class="row">
          <div class="home-info padd-15">
            <h3 class="hello">Hello, My Name is<br>
              <span>Joemel Jhoy Villanueva</span>
            </h3>

            <h3 class="my-profession">I'm an <span class="typing"></span></h3>

            <p>You can call me whatever you like.</p>

            <a href="#contact" class="hire-me">Hire Me</a>

            <ul class="download-cv">
              <li class="download-color">
                <a href="Curriculum Vitae - Villanueva, Joemel Jhoy F..pdf" target="_blank">
                  Download CV <i class="fa fa-file"></i>
                </a>
              </li>
            </ul>
          </div>

          <div class="home-img padd-15">
            <img src="MyPic.png" alt="My Picture">
          </div>
        </div>
      </div>
    </section>

    <!-- ABOUT -->
    <section class="about section" id="about">
      <div class="container">
        <div class="about-img padd-15">
          <img src="sideview.jpg" alt="Side View">
        </div>
      </div>
    </section>

    <!-- CONTACT -->
    <section class="contact section" id="contact">
      <div class="container">
        <div class="row">

          <div class="contact-information-item padd-15">
            <img src="phone.png" width="24">
            <h4>Mobile</h4>
          </div>

          <div class="contact-information-item padd-15">
            <img src="gmail.png" width="24">
            <h4>Email</h4>
          </div>

          <div class="contact-information-item padd-15">
            <img src="facebook.png" width="24">
            <h4>Facebook</h4>
          </div>

          <div class="contact-information-item padd-15">
            <img src="linkedin.png" width="24">
            <h4>LinkedIn</h4>
          </div>

        </div>
      </div>
    </section>

  </div>
</div>

<!-- ✅ JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.1.0/typed.umd.js"></script>
<script src="script.js"></script>

<script>
  new Typed(".typing", {
    strings: ["IT Specialist", "Network Engineer", "Cybersecurity"],
    typeSpeed: 80,
    backSpeed: 50,
    loop: true
  });
</script>
